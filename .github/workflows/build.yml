name: Build YOLO IPA via Package

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Create Project Specification
        run: |
          # 创建一个项目配置文件，告诉系统如何把你的代码编成 App
          cat <<EOF > project.yml
          name: YOLOApp
          options:
            bundleIdPrefix: com.guhuahuan
          targets:
            YOLOApp:
              type: application
              platform: iOS
              deploymentTarget: "16.0"
              sources: 
                - path: Sources/YOLO # 指向你的源码路径
              dependencies:
                - package: ZIPFoundation
              settings:
                INFOPLIST_FILE: Info.plist
                CODE_SIGNING_ALLOWED: NO
          packages:
            ZIPFoundation:
              url: https://github.com/weichsel/ZIPFoundation.git
              from: 0.9.20
          EOF

      - name: Create Minimal Info.plist
        run: |
          # 必须包含摄像头权限，否则 App 无法运行
          cat <<EOF > Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>\$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>\$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleName</key>
              <string>YOLOApp</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>NSCameraUsageDescription</key>
              <string>Needs camera for YOLO detection</string>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
          </dict>
          </plist>
          EOF

      - name: Generate Project
        run: xcodegen generate

      - name: Build IPA
        run: |
          # 编译生成的项目
          xcodebuild build \
            -project YOLOApp.xcodeproj \
            -scheme YOLOApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/YOLOApp.app Payload/
          zip -r YOLO_Mobile.ipa Payload
          mkdir -p output
          mv YOLO_Mobile.ipa output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YOLO-IPA
          path: output/YOLO_Mobile.ipa
