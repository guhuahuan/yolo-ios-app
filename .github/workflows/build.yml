name: Build YOLO iOS IPA (Using Existing Project)

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true # 确保下载了 LFS 管理的大体积模型文件

      - name: Build Project
        run: |
          # 根据你提供的图片，工程文件在 YOLOiOSApp/ 目录下
          # 请确认 -scheme 的名字是否为 YOLOiOSApp（通常与工程名一致）
          xcodebuild build \
            -project YOLOiOSApp/YOLOiOSApp.xcodeproj \
            -scheme YOLOiOSApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package IPA
        run: |
          mkdir -p Payload
          # 复制生成的 .app 文件
          cp -R build/Build/Products/Release-iphoneos/YOLOiOSApp.app Payload/
          
          # 验证模型文件是否被正确打包（防止 0.0 FPS 问题）
          echo "Checking for compiled models..."
          find Payload/YOLOiOSApp.app -name "*.mlmodelc"
          
          zip -r YOLO_Build.ipa Payload
          mkdir -p output
          mv YOLO_Build.ipa output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YOLO-IPA
          path: output/YOLO_Build.ipa
