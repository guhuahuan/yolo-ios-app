name: Build YOLO IPA (Fixed Resource Conflict)

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Create App Entry (AppDelegate.swift)
        run: |
          cat <<EOF > AppDelegate.swift
          import UIKit
          import YOLO
          import SwiftUI

          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  let vc = UIHostingController(rootView: YOLOView())
                  window?.rootViewController = vc
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          EOF

      - name: Create Project Specification
        run: |
          cat <<EOF > project.yml
          name: YOLOApp
          options:
            bundleIdPrefix: com.guhuahuan
          targets:
            YOLOApp:
              type: application
              platform: iOS
              deploymentTarget: "16.0"
              sources: 
                - path: Sources/YOLO
                  excludes: ["**/README.md"] # 排除冲突文件
                - path: AppDelegate.swift
                - path: Tests/YOLOTests/Resources
                  excludes: ["**/README.md"] # 排除冲突文件
              dependencies:
                - package: ZIPFoundation
              settings:
                INFOPLIST_FILE: Info.plist
                CODE_SIGNING_ALLOWED: NO
                OTHER_LDFLAGS: -framework CoreML -framework Vision -framework AVFoundation -framework CoreMedia -framework CoreVideo
          packages:
            ZIPFoundation:
              url: https://github.com/weichsel/ZIPFoundation.git
              from: 0.9.20
          EOF

      - name: Create Info.plist
        run: |
          cat <<EOF > Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>\$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>\$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleName</key>
              <string>YOLOApp</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>NSCameraUsageDescription</key>
              <string>需要摄像头权限来进行实时工业视觉检测</string>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Generate Project
        run: xcodegen generate

      - name: Build Project
        run: |
          xcodebuild build \
            -project YOLOApp.xcodeproj \
            -scheme YOLOApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/YOLOApp.app Payload/
          zip -r YOLO_Final.ipa Payload
          mkdir -p output
          mv YOLO_Final.ipa output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YOLO-IPA
          path: output/YOLO_Final.ipa
