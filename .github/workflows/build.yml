name: Build YOLO IPA via Package

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Create Entry Point (AppMain.swift)
        run: |
          # 动态生成 App 入口点，解决 _main 缺失问题
          cat <<EOF > AppMain.swift
          import SwiftUI

          @main
          struct YOLOAppEntry: App {
              var body: some Scene {
                  WindowGroup {
                      // 这里假设你的代码中有一个 YOLOView
                      // 如果报错找不到 YOLOView，请确认你源码中的 View 类名
                      if #available(iOS 16.0, *) {
                          YOLOView()
                      } else {
                          Text("iOS 16+ Required")
                      }
                  }
              }
          }
          EOF

      - name: Create Project Specification
        run: |
          cat <<EOF > project.yml
          name: YOLOApp
          options:
            bundleIdPrefix: com.guhuahuan
          targets:
            YOLOApp:
              type: application
              platform: iOS
              deploymentTarget: "16.0"
              sources: 
                - path: Sources/YOLO # 你的库源码
                - path: AppMain.swift # 我们刚生成的入口文件
              dependencies:
                - package: ZIPFoundation
              settings:
                INFOPLIST_FILE: Info.plist
                CODE_SIGNING_ALLOWED: NO
                MARKETING_VERSION: "1.0"
                CURRENT_PROJECT_VERSION: "1"
          packages:
            ZIPFoundation:
              url: https://github.com/weichsel/ZIPFoundation.git
              from: 0.9.20
          EOF

      - name: Create Minimal Info.plist
        run: |
          cat <<EOF > Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>\$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>\$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleName</key>
              <string>YOLOApp</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>NSCameraUsageDescription</key>
              <string>Needs camera for YOLO detection</string>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
          </dict>
          </plist>
          EOF

      - name: Generate Project
        run: xcodegen generate

      - name: Build IPA
        run: |
          xcodebuild build \
            -project YOLOApp.xcodeproj \
            -scheme YOLOApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/YOLOApp.app Payload/
          zip -r YOLO_Mobile.ipa Payload
          mkdir -p output
          mv YOLO_Mobile.ipa output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YOLO-IPA
          path: output/YOLO_Mobile.ipa
