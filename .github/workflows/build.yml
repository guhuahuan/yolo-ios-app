name: Build YOLO ADAS IPA

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Build Project
        run: |
          # 针对 YOLOiOSApp.xcodeproj 路径进行编译
          xcodebuild build \
            -project YOLOiOSApp/YOLOiOSApp.xcodeproj \
            -scheme YOLOiOSApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            OTHER_LDFLAGS="-framework AVFoundation -framework AudioToolbox -framework CoreHaptics"

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/YOLOiOSApp.app Payload/
          zip -r YOLO_ADAS.ipa Payload
          mkdir -p output
          mv YOLO_ADAS.ipa output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YOLO-ADAS-IPA
          path: output/YOLO_ADAS.ipa
