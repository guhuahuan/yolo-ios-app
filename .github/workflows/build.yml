name: Build YOLO IPA

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Create App Entry (AppDelegate.swift)
        run: |
          cat <<EOF > AppDelegate.swift
          import UIKit
          import SwiftUI

          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.backgroundColor = .white

                  // 这里的参数根据你的 YOLOCamera.swift 定义进行了补全
                  // 默认尝试加载 "yolov8n" 模型，这是该类库的常见默认值
                  let cameraView = YOLOCamera(
                      modelPathOrName: "yolov8n", 
                      task: .detect, 
                      cameraPosition: .back, 
                      onDetection: { _ in }
                  )
                  
                  // 因为 YOLOCamera 是一个 SwiftUI View 结构体，必须用 UIHostingController 包装
                  let rootVC = UIHostingController(rootView: cameraView)
                  
                  window?.rootViewController = rootVC
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          EOF

      - name: Create Project Specification
        run: |
          cat <<EOF > project.yml
          name: YOLOApp
          options:
            bundleIdPrefix: com.guhuahuan
          targets:
            YOLOApp:
              type: application
              platform: iOS
              deploymentTarget: "16.0"
              sources: 
                - path: Sources/YOLO
                - path: AppDelegate.swift
              dependencies:
                - package: ZIPFoundation
              settings:
                INFOPLIST_FILE: Info.plist
                CODE_SIGNING_ALLOWED: NO
                SWIFT_VERSION: "5.0"
                OTHER_LDFLAGS: -framework CoreML -framework Vision -framework AVFoundation -framework CoreMedia -framework CoreVideo -framework QuartzCore -framework SwiftUI -framework UIKit
          packages:
            ZIPFoundation:
              url: https://github.com/weichsel/ZIPFoundation.git
              from: 0.9.20
          EOF

      - name: Create Info.plist
        run: |
          cat <<EOF > Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>\$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>\$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleName</key>
              <string>YOLOApp</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>NSCameraUsageDescription</key>
              <string>我们需要摄像头权限来进行实时物体检测</string>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UIApplicationSupportsMultipleScenes</key>
                  <false/>
              </dict>
          </dict>
          </plist>
          EOF

      - name: Generate Project
        run: xcodegen generate

      - name: Build IPA
        run: |
          xcodebuild build \
            -project YOLOApp.xcodeproj \
            -scheme YOLOApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/YOLOApp.app Payload/
          zip -r YOLO_Fixed_v2.ipa Payload
          mkdir -p output
          mv YOLO_Fixed_v2.ipa output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YOLO-Final-IPA
          path: output/YOLO_Fixed_v2.ipa
